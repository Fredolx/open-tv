<div class="density-toggle">
  <button [class.active]="density === ViewDensity.GridLarge" (click)="set(ViewDensity.GridLarge)" title="Large Grid">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path d="M3,11H11V3H3M3,21H11V13H3M13,21H21V13H13M13,3V11H21V3" />
    </svg>
  </button>
  <button [class.active]="density === ViewDensity.GridCompact" (click)="set(ViewDensity.GridCompact)"
    title="Compact Grid">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path
        d="M3,9H7V5H3V9M3,14H7V10H3V14M8,14H12V10H8V14M13,14H17V10H13V14M8,9H12V5H8V9M13,5V9H17V5H13M18,14H22V10H18V14M3,19H7V15H3V19M8,19H12V15H8V19M13,19H17V15H13V19M18,19H22V15H18V19M18,5V9H22V5H18Z" />
    </svg>
  </button>
  <button [class.active]="density === ViewDensity.List" (click)="set(ViewDensity.List)" title="List View">
    <svg viewBox="0 0 24 24" fill="currentColor">
      <path
        d="M3,4H7V8H3V4M9,5V7H21V5H9M3,10H7V14H3V10M9,11V13H21V11H9M3,16H7V20H3V16M9,17V19H21V17H9" />
    </svg>
  </button>
</div>
