<div class="dashboard">
  <!-- Welcome header -->
  <div class="dashboard-header">
    <h2 class="dashboard-title">Home</h2>
    <div class="dashboard-header-actions">
      <button class="dashboard-search-btn" (click)="openSearch()">
        <svg viewBox="0 0 24 24" fill="currentColor" class="dashboard-search-icon">
          <path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z" />
        </svg>
        <span class="dashboard-search-text">Search channels...</span>
        <kbd class="dashboard-search-kbd">Ctrl+K</kbd>
      </button>
      <app-view-density-toggle></app-view-density-toggle>
    </div>
  </div>

  <!-- Loading skeleton for initial load -->
  <div *ngIf="initialLoading" class="dashboard-loading">
    <div class="skeleton-row-header">
      <div class="skeleton-heading skeleton-shimmer"></div>
    </div>
    <div class="skeleton-row-track">
      <div *ngFor="let i of [0,1,2,3,4,5]" class="skeleton-card-dash">
        <div class="skeleton-image-dash skeleton-shimmer"></div>
        <div class="skeleton-info-dash">
          <div class="skeleton-title-dash skeleton-shimmer"></div>
          <div class="skeleton-subtitle-dash skeleton-shimmer"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Empty state when no sources -->
  <div *ngIf="!initialLoading && !hasAnyContent() && memory.Sources.size === 0" class="dashboard-empty">
    <svg viewBox="0 0 24 24" fill="currentColor" class="empty-icon">
      <path d="M8.5 21H4C2.9 21 2 20.1 2 19V5C2 3.9 2.9 3 4 3H20C21.1 3 22 3.9 22 5V11.5" />
    </svg>
    <h3>Welcome to Fred TV</h3>
    <p>Add your first source to get started</p>
  </div>

  <ng-container *ngIf="!initialLoading">
    <!-- Continue Watching row -->
    <app-content-row
      *ngIf="historyRow.channels.length > 0 || historyRow.loading"
      [title]="historyRow.title"
      [channels]="historyRow.channels"
      [loading]="historyRow.loading"
      [viewMode]="viewModeHistory"
      (seeAll)="onSeeAllHistory()">
    </app-content-row>

    <!-- Favorites row -->
    <app-content-row
      *ngIf="favoritesRow.channels.length > 0 || favoritesRow.loading"
      [title]="favoritesRow.title"
      [channels]="favoritesRow.channels"
      [loading]="favoritesRow.loading"
      [viewMode]="viewModeFavorites"
      (seeAll)="onSeeAllFavorites()">
    </app-content-row>

    <!-- Category rows (lazy loaded) -->
    <div *ngFor="let row of categoryRows; let i = index; trackBy: trackByCategoryRow" [attr.data-row-index]="i">
      <app-content-row
        *ngIf="row.channels.length > 0 || row.loading"
        [title]="row.title"
        [channels]="row.channels"
        [loading]="row.loading"
        [viewMode]="viewModeAll"
        (seeAll)="onSeeAllCategory(row)">
      </app-content-row>
    </div>

    <!-- Empty state when sources exist but no content to show -->
    <div *ngIf="!hasAnyContent() && memory.Sources.size > 0" class="dashboard-empty">
      <svg viewBox="0 0 24 24" fill="currentColor" class="empty-icon">
        <path d="M8.5 21H4C2.9 21 2 20.1 2 19V5C2 3.9 2.9 3 4 3H20C21.1 3 22 3.9 22 5V11.5" />
      </svg>
      <h3>Your Dashboard</h3>
      <p>Watch some channels, add favorites, and your dashboard will fill up</p>
    </div>
  </ng-container>
</div>
