<!-- Backdrop -->
<div *ngIf="visible" class="search-backdrop" @overlayFade (click)="onBackdropClick($event)">

  <!-- Search panel -->
  <div class="search-panel" @panelScale (keydown)="onKeydown($event)">
    <!-- Search input -->
    <div class="search-input-row">
      <svg class="search-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z" />
      </svg>
      <input #searchInput
        type="text"
        class="search-input"
        placeholder="Search channels, movies, series..."
        [value]="query"
        (input)="onInput($any($event.target).value)"
        autocomplete="off"
        spellcheck="false" />
      <kbd class="search-kbd">ESC</kbd>
    </div>

    <!-- Results area -->
    <div class="search-results" *ngIf="query.length > 0">
      <!-- Loading -->
      <div *ngIf="loading" class="search-loading">
        <div class="search-loading-bar"></div>
      </div>

      <!-- No results -->
      <div *ngIf="!loading && totalCount === 0 && query.length > 0" class="search-empty">
        <svg viewBox="0 0 24 24" fill="currentColor" class="search-empty-icon">
          <path d="M15.5,14H14.71L14.43,13.73C15.41,12.59 16,11.11 16,9.5A6.5,6.5 0 0,0 9.5,3A6.5,6.5 0 0,0 3,9.5A6.5,6.5 0 0,0 9.5,16C11.11,16 12.59,15.41 13.73,14.43L14,14.71V15.5L19,20.5L20.5,19L15.5,14M9.5,14C7,14 5,12 5,9.5C5,7 7,5 9.5,5C12,5 14,7 14,9.5C14,12 12,14 9.5,14M12,10H10V12H9V10H7V9H9V7H10V9H12V10Z" />
        </svg>
        <span>No results for "{{ query }}"</span>
      </div>

      <!-- Grouped results -->
      <div *ngIf="!loading && groups.length > 0" class="search-groups">
        <div *ngFor="let group of groups; trackBy: trackByGroup" class="search-group">
          <div class="search-group-header">
            <span class="search-group-label">{{ group.label }}</span>
          </div>
          <div *ngFor="let channel of group.channels; trackBy: trackByChannelId"
            class="search-result-item"
            [class.selected]="isSelected(channel)"
            (click)="selectChannel(channel)"
            (mouseenter)="selectedIndex = flatResults.indexOf(channel)">
            <div class="result-image">
              <img *ngIf="channel.image" [src]="channel.image" (error)="$any($event.target).style.display='none'" />
            </div>
            <div class="result-info">
              <div class="result-name">{{ channel.name }}</div>
              <div class="result-source">{{ getSourceName(channel) }}</div>
            </div>
            <span class="result-badge" [ngClass]="getMediaBadgeClass(channel.media_type)">
              <ng-container [ngSwitch]="channel.media_type">
                <ng-container *ngSwitchCase="0">LIVE</ng-container>
                <ng-container *ngSwitchCase="1">MOVIE</ng-container>
                <ng-container *ngSwitchCase="2">SERIES</ng-container>
              </ng-container>
            </span>
            <svg class="result-arrow" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8.59,16.58L13.17,12L8.59,7.41L10,6L16,12L10,18L8.59,16.58Z" />
            </svg>
          </div>
        </div>

        <!-- Result count -->
        <div *ngIf="totalCount > 0" class="search-count">
          {{ totalCount }} result{{ totalCount === 1 ? '' : 's' }} found
        </div>
      </div>
    </div>

    <!-- Empty state (no query) -->
    <div *ngIf="query.length === 0" class="search-hint">
      <span>Type to search across all channels and sources</span>
    </div>
  </div>
</div>
